<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隔空手势书写系统 (Unpkg版)</title>
    
    <script src="https://unpkg.com/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands@0.4/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #videoElement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
            z-index: 1; 
            opacity: 0.1; 
        }
        #writingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }
        /* UI面板 */
        #uiPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(20, 20, 20, 0.9);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            display: none; 
            z-index: 10;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(0, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            min-width: 320px;
        }
        h3 { margin: 10px 0 5px 0; font-size: 16px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .ui-row {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ui-item {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .ui-item.active {
            border-color: #00e5ff;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            transform: translateY(-2px);
            background-color: #444;
        }
        .ui-item.hovering {
            background-color: #555;
            transform: scale(1.15);
        }
        
        /* 颜色和大小预览 */
        .color-preview { width: 100%; height: 100%; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .size-preview { border-radius: 50%; background-color: white; }
        
        /* 状态条 */
        #statusContainer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
        }
        #status {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 帮助信息 */
        #helpInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.6;
            z-index: 5;
            pointer-events: none;
            backdrop-filter: blur(5px);
            border-left: 4px solid #00e5ff;
        }
        
        /* 加载动画 */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #debugLog { margin-top: 10px; font-family: monospace; color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loadingText">正在连接 AI 服务...</div>
        <div id="debugLog">尝试加载: unpkg.com/@mediapipe/hands@0.4/hands.js</div>
    </div>

    <video id="videoElement" autoplay playsinline></video>
    <canvas id="writingCanvas"></canvas>

    <div id="uiPanel">
        <h3>工具</h3>
        <div class="ui-row">
            <div id="penItem" class="ui-item active" data-tool="pen">✏️</div>
            <div id="eraserItem" class="ui-item" data-tool="eraser">🧼</div>
            <div id="clearItem" class="ui-item" data-tool="clear">🗑️</div>
        </div>

        <h3>颜色</h3>
        <div class="ui-row" id="colorRow"></div>

        <h3>粗细</h3>
        <div class="ui-row" id="sizeRow"></div>
        
        <div style="margin-top:10px; font-size: 12px; color: #888;">食指悬停确认选择</div>
    </div>

    <div id="statusContainer">
        <div id="status">系统初始化...</div>
    </div>

    <div id="helpInfo">
        <b>🖐 全手掌</b> - 打开/关闭菜单<br>
        <b>👌 捏合 (食指+拇指)</b> - 书写<br>
        <b>✌️ 剪刀手 (食指+中指)</b> - 雪花消散<br>
        <b>👉 食指悬停</b> - 菜单选择
    </div>

    <script>
        // --- 错误捕获 ---
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const log = document.getElementById('debugLog');
            if(log) log.innerHTML += `<br><span style="color:red">Error: ${msg}</span>`;
            return false;
        };

        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('writingCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const uiPanel = document.getElementById('uiPanel');
        const statusDiv = document.getElementById('status');
        const loader = document.getElementById('loader');
        const loadingText = document.getElementById('loadingText');
        const debugLog = document.getElementById('debugLog');

        // 状态变量
        let currentTool = 'pen';
        let currentColor = '#00e5ff'; // 默认青色
        let currentSize = 8;
        let isWriting = false;
        let lastX = 0, lastY = 0;
        let uiVisible = false;
        let drawings = [];
        let drawingScale = 1;
        let drawingOffsetX = 0, drawingOffsetY = 0;
        let lastPinchDist = 0; // 双指缩放距离
        
        // UI 交互计时
        let uiHoverTimer = 0;
        let uiHoverTarget = null;
        const UI_HOVER_MAX = 20; // 悬停帧数
        let palmLock = false; // 手掌检测锁

        // --- 1. UI 初始化 ---
        const colors = ['#ffffff', '#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#00e5ff'];
        const sizes = [4, 8, 16, 24];
        
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'ui-item';
            div.dataset.color = c;
            div.innerHTML = `<div class="color-preview" style="background-color:${c}"></div>`;
            document.getElementById('colorRow').appendChild(div);
        });

        sizes.forEach(s => {
            const div = document.createElement('div');
            div.className = 'ui-item';
            div.dataset.size = s;
            div.innerHTML = `<div class="size-preview" style="width:${s}px;height:${s}px;"></div>`;
            document.getElementById('sizeRow').appendChild(div);
        });

        function updateUIVisuals() {
            document.querySelectorAll('.ui-item').forEach(e => e.classList.remove('active'));
            const toolBtn = document.querySelector(`[data-tool="${currentTool}"]`);
            if(toolBtn) toolBtn.classList.add('active');
            
            const colorBtn = document.querySelector(`[data-color="${currentColor}"]`);
            if(colorBtn) colorBtn.classList.add('active');

            const sizeBtn = document.querySelector(`[data-size="${currentSize}"]`);
            if(sizeBtn) sizeBtn.classList.add('active');
        }
        updateUIVisuals();

        // --- 2. 绘图功能 ---
        function drawLine(x1, y1, x2, y2, color, size, tool) {
            canvasCtx.save();
            canvasCtx.beginPath();
            
            // 应用缩放和位移
            const tx1 = x1 * drawingScale + drawingOffsetX;
            const ty1 = y1 * drawingScale + drawingOffsetY;
            const tx2 = x2 * drawingScale + drawingOffsetX;
            const ty2 = y2 * drawingScale + drawingOffsetY;

            if (tool === 'eraser') {
                canvasCtx.globalCompositeOperation = 'destination-out';
                canvasCtx.lineWidth = size * drawingScale * 3;
                canvasCtx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                canvasCtx.globalCompositeOperation = 'source-over';
                canvasCtx.strokeStyle = color;
                canvasCtx.lineWidth = size * drawingScale;
                canvasCtx.shadowColor = color;
                canvasCtx.shadowBlur = 5; // 添加发光效果
            }

            canvasCtx.lineCap = 'round';
            canvasCtx.lineJoin = 'round';
            canvasCtx.moveTo(tx1, ty1);
            canvasCtx.lineTo(tx2, ty2);
            canvasCtx.stroke();
            canvasCtx.restore();
        }

        function redraw() {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            drawings.forEach(d => drawLine(d.x1, d.y1, d.x2, d.y2, d.color, d.size, d.tool));
        }

        // --- 3. 手势逻辑 ---
        function dist(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function isPinching(landmarks) {
            // 8(食指尖) 和 4(拇指尖)
            return dist(landmarks[8], landmarks[4]) < 0.05;
        }

        function isPalmOpen(landmarks) {
            // 简单的手掌张开检测：所有指尖高于指根，且手指未捏合
            // 坐标系中 y 越小越高
            const tips = [8, 12, 16, 20];
            const bases = [6, 10, 14, 18];
            const allFingersUp = tips.every((tipIdx, i) => landmarks[tipIdx].y < landmarks[bases[i]].y);
            const notPinching = dist(landmarks[8], landmarks[4]) > 0.1; 
            return allFingersUp && notPinching;
        }

        function isPeaceSign(landmarks) {
            // 剪刀手：食指(8)中指(12)伸直，无名指(16)小指(20)弯曲
            const indexUp = landmarks[8].y < landmarks[6].y;
            const middleUp = landmarks[12].y < landmarks[10].y;
            const ringDown = landmarks[16].y > landmarks[14].y;
            const pinkyDown = landmarks[20].y > landmarks[18].y;
            const spread = dist(landmarks[8], landmarks[12]) > 0.06;
            return indexUp && middleUp && ringDown && pinkyDown && spread;
        }

        // --- 4. 雪花消散特效 ---
        function triggerSnowEffect() {
            if (drawings.length === 0) return;
            statusDiv.innerText = "❄️ 正在消散...";
            
            let particles = [];
            // 采样笔迹生成粒子
            const skip = 3; // 性能优化，跳过一些点
            for(let i=0; i<drawings.length; i+=skip) {
                const d = drawings[i];
                // 计算当前屏幕位置
                const px = d.x2 * drawingScale + drawingOffsetX;
                const py = d.y2 * drawingScale + drawingOffsetY;
                
                particles.push({
                    x: px, 
                    y: py,
                    vx: (Math.random() - 0.5) * 6,
                    vy: Math.random() * 2 + 2, // 下落速度
                    alpha: 1.0,
                    color: d.color
                });
            }
            
            drawings = []; // 清空数据
            redraw(); // 清空画布

            function animateSnow() {
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                let active = false;
                
                particles.forEach(p => {
                    if (p.alpha > 0) {
                        active = true;
                        p.x += p.vx;
                        p.y += p.vy;
                        p.alpha -= 0.015;
                        
                        canvasCtx.save();
                        canvasCtx.globalAlpha = p.alpha;
                        canvasCtx.fillStyle = p.color;
                        canvasCtx.beginPath();
                        canvasCtx.arc(p.x, p.y, Math.random() * 2 + 1, 0, Math.PI*2);
                        canvasCtx.fill();
                        canvasCtx.restore();
                    }
                });

                if (active) {
                    requestAnimationFrame(animateSnow);
                } else {
                    statusDiv.innerText = "✨ 画布已清空";
                }
            }
            animateSnow();
        }

        // --- 5. MediaPipe 处理 ---
        if (typeof Hands === 'undefined') {
            loadingText.innerText = "Error: MediaPipe 库加载失败";
            debugLog.innerText += "\n请检查网络连接或代理设置";
        }

        const hands = new Hands({
            locateFile: (file) => {
                // 关键点：使用 unpkg 的通用路径
                // 如果本地代理有问题，unpkg 可能会绕过特定的缓存错误
                debugLog.innerText = `请求文件: https://unpkg.com/@mediapipe/hands@0.4/${file}`;
                return `https://unpkg.com/@mediapipe/hands@0.4/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1, // 0=Lite, 1=Full. 如果卡顿可改为0
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(results => {
            // 第一次成功获取结果时隐藏 loading
            if(loader.style.display !== 'none') {
                loader.style.display = 'none';
                statusDiv.innerText = "系统就绪";
            }

            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            redraw();

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

            const hand1 = results.multiHandLandmarks[0];
            
            // 坐标转换（X轴镜像）
            const indexTip = {
                x: (1 - hand1[8].x) * canvasElement.width,
                y: hand1[8].y * canvasElement.height
            };

            // A. 手掌检测 (开关UI)
            if (isPalmOpen(hand1)) {
                if (!palmLock) {
                    uiVisible = !uiVisible;
                    uiPanel.style.display = uiVisible ? 'flex' : 'none';
                    statusDiv.innerText = uiVisible ? "菜单开启" : "菜单关闭";
                    palmLock = true;
                    setTimeout(() => palmLock = false, 1200); // 1.2秒冷却防止闪烁
                    isWriting = false;
                }
            }

            // B. UI 交互模式
            if (uiVisible) {
                // 绘制光标
                canvasCtx.beginPath();
                canvasCtx.arc(indexTip.x, indexTip.y, 8, 0, Math.PI*2);
                canvasCtx.strokeStyle = 'cyan';
                canvasCtx.lineWidth = 2;
                canvasCtx.stroke();

                let hovering = false;
                document.querySelectorAll('.ui-item').forEach(item => {
                    const r = item.getBoundingClientRect();
                    item.classList.remove('hovering');

                    if (indexTip.x > r.left && indexTip.x < r.right && 
                        indexTip.y > r.top && indexTip.y < r.bottom) {
                        
                        hovering = true;
                        item.classList.add('hovering');
                        
                        if (uiHoverTarget === item) {
                            uiHoverTimer++;
                            statusDiv.innerText = `选择中... ${Math.floor((uiHoverTimer/UI_HOVER_MAX)*100)}%`;
                            
                            // 环形进度条绘制
                            canvasCtx.beginPath();
                            canvasCtx.arc(indexTip.x, indexTip.y, 12, 0, (uiHoverTimer/UI_HOVER_MAX)*Math.PI*2);
                            canvasCtx.strokeStyle = 'yellow';
                            canvasCtx.stroke();

                            if (uiHoverTimer > UI_HOVER_MAX) {
                                // 触发点击
                                if (item.dataset.tool === 'clear') {
                                    drawings = [];
                                    redraw();
                                    statusDiv.innerText = "画布已清除";
                                } else {
                                    if(item.dataset.tool) currentTool = item.dataset.tool;
                                    if(item.dataset.color) currentColor = item.dataset.color;
                                    if(item.dataset.size) currentSize = parseInt(item.dataset.size);
                                    updateUIVisuals();
                                    statusDiv.innerText = "设置已更新";
                                }
                                uiHoverTimer = 0;
                            }
                        } else {
                            uiHoverTarget = item;
                            uiHoverTimer = 0;
                        }
                    }
                });

                if (!hovering) {
                    uiHoverTarget = null;
                    uiHoverTimer = 0;
                }
                return; // UI模式下不进行后续检测
            }

            // C. 雪花消散 (剪刀手)
            if (isPeaceSign(hand1)) {
                triggerSnowEffect();
                return;
            }

            // D. 双指缩放 (需要两只手)
            if (results.multiHandLandmarks.length === 2) {
                const hand2 = results.multiHandLandmarks[1];
                // 只有当两只手都做捏合姿势时才缩放
                if (isPinching(hand1) && isPinching(hand2)) {
                    const h1Pos = { x: (1-hand1[8].x)*canvasElement.width, y: hand1[8].y*canvasElement.height };
                    const h2Pos = { x: (1-hand2[8].x)*canvasElement.width, y: hand2[8].y*canvasElement.height };
                    const currDist = Math.sqrt(Math.pow(h1Pos.x - h2Pos.x, 2) + Math.pow(h1Pos.y - h2Pos.y, 2));

                    if (lastPinchDist > 0) {
                        const delta = currDist - lastPinchDist;
                        if (Math.abs(delta) > 2) {
                            const zoomFactor = 1 + delta * 0.002;
                            // 限制缩放范围
                            let newScale = drawingScale * zoomFactor;
                            newScale = Math.max(0.5, Math.min(newScale, 3.0));
                            
                            // 简单的居中缩放计算
                            drawingScale = newScale;
                            statusDiv.innerText = `缩放: ${drawingScale.toFixed(2)}x`;
                        }
                    }
                    lastPinchDist = currDist;
                    return; // 缩放时不书写
                }
            } else {
                lastPinchDist = 0;
            }

            // E. 书写 (单手捏合)
            if (isPinching(hand1)) {
                // 计算实际绘图坐标（反向应用缩放和偏移）
                const realX = (indexTip.x - drawingOffsetX) / drawingScale;
                const realY = (indexTip.y - drawingOffsetY) / drawingScale;

                if (!isWriting) {
                    isWriting = true;
                    lastX = realX;
                    lastY = realY;
                }

                drawings.push({
                    x1: lastX, y1: lastY,
                    x2: realX, y2: realY,
                    color: currentColor,
                    size: currentSize,
                    tool: currentTool
                });

                lastX = realX;
                lastY = realY;
                statusDiv.innerText = currentTool === 'eraser' ? "✍️ 擦除..." : "✍️ 书写...";
            } else {
                isWriting = false;
                statusDiv.innerText = "👋 待机中";
            }
        });

        // --- 启动摄像头 ---
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        
        loadingText.innerText = "正在请求摄像头权限...";
        camera.start().catch(err => {
            loadingText.innerText = "无法启动摄像头: " + err;
            debugLog.innerText += "\n请允许浏览器访问摄像头";
        });

        window.addEventListener('resize', () => {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            redraw();
        });

    </script>
</body>
</html>
