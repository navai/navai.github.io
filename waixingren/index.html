<script>
// ==================== 游戏配置 ====================
const CONFIG = {
  gameTime: 300,
  totalEnemies: 15,
  magSize: 5,
  reloadTime: 2000,
  aimZoom: 2.0,
  chameleonOpacity: 0.45,
  chameleonColorBlend: 0,
};

// ==================== 游戏状态 ====================
let gameState = {
  playing: false,
  timeLeft: CONFIG.gameTime,
  score: 0,
  enemiesKilled: 0,
  enemies: [],
  buildings: [],
  cars: [],
  trees: [],
  streetProps: [],
  particles: [],
  aimMode: false,
  aimX: 0, aimY: 0,
  soundOn: true,
  intelUses: 3,
  scanUses: 2,
  ammo: CONFIG.magSize,
  reloading: false,
  shakeAmount: 0,
  recoilOffset: 0,
  bgCanvas: null,
  alienImg: null,
  alienImgLoaded: false,
};

// ==================== Canvas 设置 ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resizeCanvas() {
  const container = document.getElementById('gameContainer');
  W = container.clientWidth;
  H = container.clientHeight;
  canvas.width = W;
  canvas.height = H;
  
  if (gameState.buildings.length === 0 || !gameState.bgCanvas) {
    generateCity();
    renderBackground();
  }
  gameState.aimX = W / 2;
  gameState.aimY = H / 2;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ==================== 音效系统 ====================
const sounds = {
  shoot: document.getElementById('sndShoot'),
  scream: document.getElementById('sndScream'),
  reload: document.getElementById('sndReload'),
  headshot: document.getElementById('sndHeadshot'),
  click: document.getElementById('sndClick'),
  shell: document.getElementById('sndShell'),
  spin: document.getElementById('sndSpin'),
  mock: document.getElementById('sndMock'),
};

function playSound(name) {
  if (!gameState.soundOn) return;
  const snd = sounds[name];
  if (!snd) return;
  try {
    snd.currentTime = 0;
    snd.volume = 0.6;
    snd.play().catch(() => {});
  } catch(e) {}
}

function toggleSound() {
  gameState.soundOn = !gameState.soundOn;
  document.getElementById('soundBtn').textContent = gameState.soundOn ? '🔊' : '🔇';
}

// ==================== 外星人图片加载 ====================
function loadAlienImage() {
  const img = document.getElementById('alienImg');
  if (img.complete && img.naturalWidth > 0) {
    gameState.alienImg = img;
    gameState.alienImgLoaded = true;
    console.log('外星人图片已加载:', img.naturalWidth + 'x' + img.naturalHeight);
  } else {
    img.onload = function() {
      gameState.alienImg = img;
      gameState.alienImgLoaded = true;
      console.log('外星人图片加载完成:', img.naturalWidth + 'x' + img.naturalHeight);
    };
  }
}
loadAlienImage();

// ==================== 城市生成 ====================
function generateCity() {
  gameState.buildings = [];
  gameState.cars = [];
  gameState.trees = [];
  gameState.streetProps = [];
  
  const groundY = H * 0.68;
  const horizonY = H * 0.38;
  
  // 远景建筑
  for (let i = 0; i < 18; i++) {
    const w = 50 + Math.random() * 70;
    const h = 80 + Math.random() * 120;
    gameState.buildings.push({
      x: i * (W / 18) - 15 + Math.random() * 10,
      y: horizonY - h * 0.25,
      w: w, h: h * 0.25,
      baseColor: `hsl(${20 + Math.random() * 30}, ${15 + Math.random() * 10}%, ${35 + Math.random() * 10}%)`,
      windows: 3, floors: 5,
      depth: 3, windowColors: []
    });
  }
  
  // 中景建筑
  for (let i = 0; i < 10; i++) {
    const w = 90 + Math.random() * 100;
    const h = 200 + Math.random() * 180;
    const baseHue = 15 + Math.random() * 25;
    gameState.buildings.push({
      x: i * (W / 10) - 40 + Math.random() * 20,
      y: groundY - h * 0.55,
      w: w, h: h * 0.55,
      baseColor: `hsl(${baseHue}, ${25 + Math.random() * 15}%, ${40 + Math.random() * 15}%)`,
      windows: 4, floors: 7,
      depth: 2,
      hasShop: Math.random() > 0.4,
      roofType: Math.floor(Math.random() * 4),
      brickTexture: Math.random() > 0.5,
      windowColors: []
    });
  }
  
  // 近景建筑
  for (let i = 0; i < 5; i++) {
    const w = 130 + Math.random() * 100;
    const h = 280 + Math.random() * 220;
    const baseHue = 10 + Math.random() * 30;
    gameState.buildings.push({
      x: i * (W / 4.5) - 50 + Math.random() * 25,
      y: groundY - h * 0.75,
      w: w, h: h * 0.75,
      baseColor: `hsl(${baseHue}, ${30 + Math.random() * 15}%, ${45 + Math.random() * 10}%)`,
      windows: 5, floors: 9,
      depth: 1, hasShop: true,
      roofType: Math.floor(Math.random() * 4),
      brickTexture: true,
      acUnits: Math.floor(Math.random() * 3) + 1,
      windowColors: []
    });
  }
  
  // 预生成窗户颜色
  gameState.buildings.forEach(b => {
    for (let f = 0; f < b.floors; f++) {
      b.windowColors[f] = [];
      for (let w = 0; w < b.windows; w++) {
        const r = Math.random();
        if (r < 0.35) b.windowColors[f][w] = 'rgba(255, 220, 100, 0.9)';
        else if (r < 0.55) b.windowColors[f][w] = 'rgba(200, 230, 255, 0.8)';
        else b.windowColors[f][w] = 'rgba(30, 40, 60, 0.8)';
      }
    }
  });
  
  gameState.buildings.sort((a, b) => a.depth - b.depth);
  
  // 车辆
  const carPalette = [
    '#4a90d9',
    '#c0392b', '#27ae60', '#f39c12', '#8e44ad',
    '#ecf0f1', '#7f8c8d', '#d35400', '#2c3e50', '#16a085'
  ];
  for (let i = 0; i < 7; i++) {
    gameState.cars.push({
      x: Math.random() * W,
      y: groundY + 15 + Math.random() * 55,
      w: 55 + Math.random() * 35,
      h: 25 + Math.random() * 12,
      color: carPalette[Math.floor(Math.random() * carPalette.length)],
      speed: (Math.random() - 0.5) * 0.4,
      type: Math.random() > 0.65 ? 'muscle' : 'sedan',
      depth: 1 + Math.random(),
      hasStripes: Math.random() > 0.5
    });
  }
  gameState.cars.sort((a, b) => a.depth - b.depth);
  
  // 树
  for (let i = 0; i < 10; i++) {
    gameState.trees.push({
      x: Math.random() * W,
      y: groundY - 5 + Math.random() * 70,
      size: 28 + Math.random() * 25,
      trunkColor: '#5d4037',
      leafColors: [`hsl(${25 + Math.random() * 20}, 70%, 45%)`, `hsl(${20 + Math.random() * 15}, 65%, 40%)`],
      depth: 1 + Math.random() * 0.5
    });
  }
  gameState.trees.sort((a, b) => a.depth - b.depth);
  
  // 街道设施
  for (let i = 0; i < 5; i++) {
    gameState.streetProps.push({ type: 'lamp', x: 80 + i * (W / 5), y: groundY, size: 60, depth: 1.2 });
  }
  for (let i = 0; i < 3; i++) {
    gameState.streetProps.push({ type: 'hydrant', x: 150 + i * 250 + Math.random() * 80, y: groundY + 8, size: 18, depth: 1.1 });
  }
  for (let i = 0; i < 3; i++) {
    gameState.streetProps.push({ type: 'trashcan', x: 200 + i * 300 + Math.random() * 100, y: groundY + 5, size: 22, depth: 1.1 });
  }
  gameState.streetProps.sort((a, b) => a.depth - b.depth);
}

// ==================== 背景渲染 ====================
function renderBackground() {
  if (!gameState.bgCanvas) {
    gameState.bgCanvas = document.createElement('canvas');
  }
  gameState.bgCanvas.width = W;
  gameState.bgCanvas.height = H;
  const bgCtx = gameState.bgCanvas.getContext('2d');
  
  const groundY = H * 0.68;
  
  // 天空
  const skyGrad = bgCtx.createLinearGradient(0, 0, 0, groundY);
  skyGrad.addColorStop(0, '#d4a574');
  skyGrad.addColorStop(0.3, '#c9956a');
  skyGrad.addColorStop(0.6, '#b8845c');
  skyGrad.addColorStop(1, '#a67350');
  bgCtx.fillStyle = skyGrad;
  bgCtx.fillRect(0, 0, W, groundY);
  
  bgCtx.fillStyle = 'rgba(180, 160, 140, 0.3)';
  bgCtx.fillRect(0, H * 0.3, W, H * 0.15);
  
  // 建筑
  gameState.buildings.forEach(b => drawBuilding(bgCtx, b));
  
  // 地面
  bgCtx.fillStyle = '#8b8680';
  bgCtx.fillRect(0, groundY - 8, W, 16);
  bgCtx.strokeStyle = 'rgba(0,0,0,0.1)';
  bgCtx.lineWidth = 1;
  for (let i = 0; i < W; i += 40) {
    bgCtx.beginPath();
    bgCtx.moveTo(i, groundY - 8);
    bgCtx.lineTo(i, groundY + 8);
    bgCtx.stroke();
  }
  
  const roadGrad = bgCtx.createLinearGradient(0, groundY + 8, 0, H);
  roadGrad.addColorStop(0, '#4a4a4a');
  roadGrad.addColorStop(1, '#3a3a3a');
  bgCtx.fillStyle = roadGrad;
  bgCtx.fillRect(0, groundY + 8, W, H - groundY - 8);
  
  // 沥青纹理
  for (let i = 0; i < 500; i++) {
    bgCtx.fillStyle = `rgba(${30 + Math.random() * 30}, ${30 + Math.random() * 30}, ${30 + Math.random() * 30}, 0.3)`;
    bgCtx.fillRect(Math.random() * W, groundY + 8 + Math.random() * (H - groundY - 8), 2, 2);
  }
  
  // 道路标线
  bgCtx.strokeStyle = '#f5d76e';
  bgCtx.lineWidth = 3;
  bgCtx.setLineDash([28, 18]);
  bgCtx.beginPath();
  bgCtx.moveTo(0, groundY + 55);
  bgCtx.lineTo(W, groundY + 55);
  bgCtx.stroke();
  bgCtx.setLineDash([]);
  
  bgCtx.strokeStyle = 'rgba(255,255,255,0.6)';
  bgCtx.lineWidth = 2;
  bgCtx.beginPath();
  bgCtx.moveTo(0, groundY + 12);
  bgCtx.lineTo(W, groundY + 12);
  bgCtx.stroke();
  
  // 斑马线
  bgCtx.fillStyle = '#e8e8e8';
  const zxStart = W * 0.25;
  for (let i = 0; i < 10; i++) {
    bgCtx.fillRect(zxStart + i * 22, groundY + 90, 12, 55);
  }
  
  // 车辆
  gameState.cars.forEach(car => drawCar(bgCtx, car));
  
  // 树
  gameState.trees.forEach(tree => drawTree(bgCtx, tree));
  
  // 街道设施
  gameState.streetProps.forEach(prop => drawStreetProp(bgCtx, prop));
}

function drawBuilding(ctx, b) {
  const x = b.x, y = b.y, w = b.w, h = b.h;
  
  ctx.fillStyle = b.baseColor;
  ctx.fillRect(x, y, w, h);
  
  const rightW = w * 0.12;
  const darkGrad = ctx.createLinearGradient(x + w - rightW, 0, x + w, 0);
  darkGrad.addColorStop(0, 'rgba(0,0,0,0.1)');
  darkGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = darkGrad;
  ctx.fillRect(x + w - rightW, y, rightW, h);
  
  if (b.brickTexture && b.depth <= 2) {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    const brickH = 8, brickW = 20;
    for (let by = y + 10; by < y + h - 10; by += brickH) {
      const offset = ((by - y) / brickH) % 2 === 0 ? 0 : brickW / 2;
      for (let bx = x + 5 + offset; bx < x + w - rightW - 5; bx += brickW) {
        ctx.fillRect(bx, by, 1, brickH - 1);
      }
    }
  }
  
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(x, y, w, 6);
  
  if (b.roofType === 1 && b.depth <= 2) {
    ctx.fillStyle = '#6d6d6d';
    ctx.beginPath();
    ctx.ellipse(x + w * 0.7, y - 8, 12, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  } else if (b.roofType === 2 && b.depth <= 2) {
    ctx.fillStyle = '#5a4a4a';
    ctx.fillRect(x + w * 0.25, y - 18, 10, 18);
  }
  
  if (b.acUnits && b.depth === 1) {
    for (let i = 0; i < b.acUnits; i++) {
      const acx = x + 15 + i * 28, acy = y + 8;
      ctx.fillStyle = '#909090';
      ctx.fillRect(acx, acy, 22, 14);
      ctx.fillStyle = '#707070';
      ctx.fillRect(acx + 2, acy + 3, 18, 7);
    }
  }
  
  // 窗户
  const windowW = (w / b.windows) * 0.48;
  const windowH = (h / b.floors) * 0.38;
  const startY = y + h / b.floors * 0.3;
  const floorH = h / b.floors;
  
  for (let f = 0; f < b.floors; f++) {
    for (let wi = 0; wi < b.windows; wi++) {
      const wx = x + (w / (b.windows + 1)) * (wi + 1) - windowW / 2;
      const wy = startY + f * floorH;
      
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(wx - 2, wy - 2, windowW + 4, windowH + 4);
      ctx.fillStyle = b.windowColors[f][wi];
      ctx.fillRect(wx, wy, windowW, windowH);
      
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx + windowW / 2, wy);
      ctx.lineTo(wx + windowW / 2, wy + windowH);
      ctx.moveTo(wx, wy + windowH / 2);
      ctx.lineTo(wx + windowW, wy + windowH / 2);
      ctx.stroke();
      
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(wx - 3, wy + windowH, windowW + 6, 2);
    }
  }
  
  // 商店
  if (b.hasShop && b.depth <= 2) {
    const shopH = h * 0.13;
    const shopY = y + h - shopH;
    
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(x, shopY - 2, w, shopH + 2);
    
    const displayW = w * 0.3;
    ctx.fillStyle = 'rgba(100, 180, 220, 0.6)';
    ctx.fillRect(x + w * 0.08, shopY + 4, displayW, shopH - 8);
    ctx.fillRect(x + w * 0.62, shopY + 4, displayW, shopH - 8);
    
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + w * 0.08, shopY + 4, displayW, shopH - 8);
    ctx.strokeRect(x + w * 0.62, shopY + 4, displayW, shopH - 8);
    
    const doorW = w * 0.14;
    const doorX = x + w * 0.43;
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(doorX, shopY + 2, doorW, shopH - 2);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(doorX + doorW * 0.75, shopY + shopH / 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(180, 200, 220, 0.5)';
    ctx.fillRect(doorX + 3, shopY + 5, doorW - 6, shopH * 0.5);
    
    const awningColors = ['#c0392b', '#2980b9', '#27ae60', '#8e44ad', '#d35400'];
    ctx.fillStyle = awningColors[Math.floor(Math.random() * awningColors.length)];
    ctx.beginPath();
    ctx.moveTo(x, shopY);
    ctx.lineTo(x + w * 0.35, shopY);
    ctx.lineTo(x + w * 0.28, shopY - 18);
    ctx.lineTo(x + w * 0.05, shopY - 18);
    ctx.closePath();
    ctx.fill();
  }
}

function drawCar(ctx, car) {
  const x = car.x, y = car.y, w = car.w, h = car.h;
  
  ctx.save();
  
  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h * 0.7, w * 0.45, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  
  if (car.type === 'muscle') {
    ctx.fillStyle = car.color;
    ctx.fillRect(x, y + h * 0.2, w, h * 0.55);
    ctx.beginPath();
    ctx.moveTo(x + w * 0.2, y + h * 0.2);
    ctx.quadraticCurveTo(x + w * 0.3, y - h * 0.15, x + w * 0.45, y - h * 0.1);
    ctx.lineTo(x + w * 0.65, y - h * 0.05);
    ctx.quadraticCurveTo(x + w * 0.8, y + h * 0.05, x + w * 0.88, y + h * 0.2);
    ctx.closePath();
    ctx.fill();
    
    if (car.hasStripes) {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(x + w * 0.4, y - h * 0.08, w * 0.06, h * 0.35);
      ctx.fillRect(x + w * 0.5, y - h * 0.08, w * 0.06, h * 0.35);
    }
    
    ctx.fillStyle = 'rgba(80, 120, 160, 0.7)';
    ctx.beginPath();
    ctx.moveTo(x + w * 0.28, y + h * 0.15);
    ctx.quadraticCurveTo(x + w * 0.35, y - h * 0.05, x + w * 0.48, y - h * 0.06);
    ctx.lineTo(x + w * 0.48, y + h * 0.12);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + w * 0.5, y + h * 0.12);
    ctx.lineTo(x + w * 0.5, y - h * 0.04);
    ctx.quadraticCurveTo(x + w * 0.65, y, x + w * 0.75, y + h * 0.15);
    ctx.closePath();
    ctx.fill();
    
  } else {
    ctx.fillStyle = car.color;
    ctx.fillRect(x, y + h * 0.2, w, h * 0.5);
    ctx.beginPath();
    ctx.moveTo(x + w * 0.2, y + h * 0.2);
    ctx.lineTo(x + w * 0.3, y - h * 0.1);
    ctx.lineTo(x + w * 0.7, y - h * 0.1);
    ctx.lineTo(x + w * 0.85, y + h * 0.2);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = 'rgba(100, 160, 200, 0.7)';
    ctx.fillRect(x + w * 0.28, y - h * 0.05, w * 0.22, h * 0.25);
    ctx.fillRect(x + w * 0.55, y - h * 0.05, w * 0.2, h * 0.25);
  }
  
  // 车轮
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(x + w * 0.22, y + h * 0.65, h * 0.22, 0, Math.PI * 2);
  ctx.arc(x + w * 0.78, y + h * 0.65, h * 0.22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.arc(x + w * 0.22, y + h * 0.65, h * 0.1, 0, Math.PI * 2);
  ctx.arc(x + w * 0.78, y + h * 0.65, h * 0.1, 0, Math.PI * 2);
  ctx.fill();
  
  // 车灯
  ctx.fillStyle = '#f5d76e';
  ctx.fillRect(x + w - 3, y + h * 0.25, 4, h * 0.15);
  ctx.fillStyle = '#e74c3c';
  ctx.fillRect(x - 1, y + h * 0.25, 3, h * 0.12);
  
  ctx.restore();
}

function drawTree(ctx, tree) {
  const x = tree.x, y = tree.y, s = tree.size;
  
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(x, y + 2, s * 0.4, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = tree.trunkColor;
  ctx.fillRect(x - 3, y - s * 0.3, 6, s * 0.4);
  
  const layers = 3;
  for (let i = 0; i < layers; i++) {
    const layerY = y - s * 0.3 - i * s * 0.25;
    const layerSize = s * (0.6 - i * 0.15);
    ctx.fillStyle = tree.leafColors[i % tree.leafColors.length];
    ctx.beginPath();
    ctx.moveTo(x, layerY - layerSize * 0.5);
    ctx.lineTo(x + layerSize * 0.5, layerY);
    ctx.lineTo(x + layerSize * 0.3, layerY + layerSize * 0.3);
    ctx.lineTo(x - layerSize * 0.3, layerY + layerSize * 0.3);
    ctx.lineTo(x - layerSize * 0.5, layerY);
    ctx.closePath();
    ctx.fill();
  }
}

function drawStreetProp(ctx, prop) {
  const x = prop.x, y = prop.y, s = prop.size;
  switch (prop.type) {
    case 'lamp':
      ctx.fillStyle = '#444';
      ctx.fillRect(x - 2, y - s, 4, s);
      ctx.fillStyle = '#333';
      ctx.fillRect(x - 12, y - s - 4, 24, 6);
      ctx.fillStyle = 'rgba(255, 230, 150, 0.9)';
      ctx.beginPath();
      ctx.ellipse(x, y - s + 2, 8, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      break;
    case 'hydrant':
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(x - s * 0.3, y - s, s * 0.6, s);
      ctx.beginPath();
      ctx.arc(x, y - s, s * 0.3, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(x - s * 0.15, y - s - s * 0.2, s * 0.3, s * 0.15);
      break;
    case 'trashcan':
      ctx.fillStyle = '#5d6d7e';
      ctx.fillRect(x - s * 0.4, y - s, s * 0.8, s);
      ctx.fillStyle = '#34495e';
      ctx.fillRect(x - s * 0.45, y - s - 4, s * 0.9, 5);
      break;
  }
}

// ==================== 敌人生成 ====================
function generateEnemies() {
  gameState.enemies = [];
  const groundY = H * 0.68;
  
  const hideSpots = [];
  
  // 建筑窗户藏点
  gameState.buildings.forEach(b => {
    if (b.depth > 2) return;
    const windowW = (b.w / b.windows) * 0.48;
    const startY = b.y + b.h / b.floors * 0.3;
    const floorH = b.h / b.floors;
    
    const count = Math.random() > 0.5 ? 2 : 1;
    for (let i = 0; i < count; i++) {
      const f = Math.floor(Math.random() * (b.floors - 1)) + 1;
      const wi = Math.floor(Math.random() * b.windows);
      const wx = b.x + (b.w / (b.windows + 1)) * (wi + 1);
      const wy = startY + f * floorH + windowW * 0.3;
      hideSpots.push({
        x: wx, y: wy,
        size: windowW * 0.45,
        bgArea: 'window',
      });
    }
    
    // 门口
    if (b.hasShop) {
      hideSpots.push({
        x: b.x + b.w * 0.5,
        y: b.y + b.h - b.h * 0.13 + 18,
        size: 18 - b.depth * 2,
        bgArea: 'doorway',
      });
    }
  });
  
  // 车旁藏点
  gameState.cars.forEach((car, idx) => {
    if (Math.random() > 0.35) {
      hideSpots.push({
        x: car.x + car.w * (Math.random() > 0.5 ? 0.2 : 0.8),
        y: car.y - car.h * 0.3,
        size: 16 + car.depth,
        bgArea: 'car',
        carColor: car.color,
      });
    }
  });
  
  // 树旁
  gameState.trees.forEach((tree, idx) => {
    if (Math.random() > 0.5) {
      hideSpots.push({
        x: tree.x + (Math.random() - 0.5) * tree.size * 0.4,
        y: tree.y - tree.size * 0.1,
        size: 14 + tree.depth,
        bgArea: 'tree',
      });
    }
  });
  
  // 街道设施旁
  gameState.streetProps.forEach((prop, idx) => {
    if (prop.type === 'trashcan' && Math.random() > 0.4) {
      hideSpots.push({
        x: prop.x + prop.size * 0.7,
        y: prop.y - prop.size * 0.4,
        size: 15,
        bgArea: 'prop',
      });
    }
  });
  
  // 安全边距
  const safeMarginX = W * 0.10;
  const safeMarginY = H * 0.10;
  
  const validSpots = hideSpots.filter(spot => {
    return spot.x > safeMarginX && spot.x < W - safeMarginX &&
           spot.y > safeMarginY && spot.y < H - safeMarginY;
  });
  
  shuffleArray(validSpots);
  const selected = validSpots.slice(0, CONFIG.totalEnemies);
  
  selected.forEach((spot, i) => {
    gameState.enemies.push({
      id: i,
      x: spot.x, y: spot.y,
      size: spot.size,
      alive: true,
      revealed: false,
      revealTimer: 0,
      hitFlash: 0,
      deathAnim: 0,
      bobPhase: Math.random() * Math.PI * 2,
      bobSpeed: 0.8 + Math.random() * 0.5,
      blinkTimer: 3 + Math.random() * 5,
      blinking: false,
      bgArea: spot.bgArea,
      carColor: spot.carColor || null,
    });
  });
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ==================== 外星人绘制 ====================
function getPixelColor(x, y) {
  if (!gameState.bgCanvas) return '#888888';
  const bgCtx = gameState.bgCanvas.getContext('2d');
  try {
    const pixel = bgCtx.getImageData(Math.max(0, Math.min(W-1, Math.floor(x))), Math.max(0, Math.min(H-1, Math.floor(y))), 1, 1).data;
    return `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;
  } catch {
    return '#888888';
  }
}

function parseRGB(rgbStr) {
  const m = rgbStr.match(/\d+/g);
  if (!m) return [128, 128, 128];
  return [parseInt(m[0]), parseInt(m[1]), parseInt(m[2])];
}

function drawAlien(ctx, alien, time) {
  if (!alien.alive && alien.deathAnim <= 0) return;
  if (!gameState.alienImgLoaded || !gameState.alienImg) return;
  
  const x = alien.x;
  const bob = Math.sin(time * alien.bobSpeed + alien.bobPhase) * 1.5;
  let y = alien.y + bob;
  
  // 死亡动画
  let alpha = 1;
  let scale = 1;
  let rot = 0;
  if (!alien.alive) {
    alien.deathAnim -= 0.02;
    alpha = Math.max(0, alien.deathAnim);
    scale = 1 + (1 - alien.deathAnim) * 0.2;
    rot = (1 - alien.deathAnim) * 0.8;
  }
  
  const img = gameState.alienImg;
  const s = alien.size;
  const imgW = img.width;
  const imgH = img.height;
  const drawH = s * 2.5;
  const drawW = drawH * (imgW / imgH);
  
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(scale, scale);
  
  // 采样背景颜色
  let bodyColor;
  if (alien.carColor) {
    bodyColor = alien.carColor;
  } else {
    bodyColor = getPixelColor(x, y - s * 0.3);
  }
  const [br, bg, bb] = parseRGB(bodyColor);
  
  // 显示强度
  let visibility = CONFIG.chameleonOpacity;
  if (alien.revealed || alien.revealTimer > 0) visibility = 0.9;
  if (alien.hitFlash > 0) visibility = 1;
  
  ctx.globalAlpha = alpha * visibility;
  
  // 绘制外星人
  ctx.save();
  ctx.translate(-drawW / 2, -drawH * 0.85);
  
  // 第一层：原始图片
  ctx.drawImage(img, 0, 0, drawW, drawH);
  
  // 第二层：颜色混合（变色龙效果）
  ctx.globalCompositeOperation = 'source-atop';
  ctx.fillStyle = `rgba(${br}, ${bg}, ${bb}, ${CONFIG.chameleonColorBlend})`;
  ctx.fillRect(0, 0, drawW, drawH);
  
  ctx.restore();
  
  // 命中闪光
  if (alien.hitFlash > 0) {
    ctx.globalAlpha = alpha * alien.hitFlash * 0.5;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(0, -s * 0.5, s * 0.9, 0, Math.PI * 2);
    ctx.fill();
    alien.hitFlash -= 0.04;
  }
  
  // 情报标记（四方边框）
  if (alien.revealed || alien.revealTimer > 0) {
    ctx.globalAlpha = alpha * 0.9;
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    
    const bw = drawW * 0.6;
    const bh = drawH * 0.55;
    ctx.strokeRect(-bw / 2, -drawH * 0.85 - bh * 0.05, bw, bh);
    
    ctx.setLineDash([]);
    
    // 四角标记
    const cornerLen = 8;
    ctx.lineWidth = 3;
    // 左上
    ctx.beginPath();
    ctx.moveTo(-bw/2, -drawH*0.85 - bh*0.05);
    ctx.lineTo(-bw/2 + cornerLen, -drawH*0.85 - bh*0.05);
    ctx.moveTo(-bw/2, -drawH*0.85 - bh*0.05);
    ctx.lineTo(-bw/2, -drawH*0.85 - bh*0.05 + cornerLen);
    ctx.stroke();
    // 右上
    ctx.beginPath();
    ctx.moveTo(bw/2, -drawH*0.85 - bh*0.05);
    ctx.lineTo(bw/2 - cornerLen, -drawH*0.85 - bh*0.05);
    ctx.moveTo(bw/2, -drawH*0.85 - bh*0.05);
    ctx.lineTo(bw/2, -drawH*0.85 - bh*0.05 + cornerLen);
    ctx.stroke();
    // 左下
    ctx.beginPath();
    ctx.moveTo(-bw/2, -drawH*0.85 - bh*0.05 + bh);
    ctx.lineTo(-bw/2 + cornerLen, -drawH*0.85 - bh*0.05 + bh);
    ctx.moveTo(-bw/2, -drawH*0.85 - bh*0.05 + bh);
    ctx.lineTo(-bw/2, -drawH*0.85 - bh*0.05 + bh - cornerLen);
    ctx.stroke();
    // 右下
    ctx.beginPath();
    ctx.moveTo(bw/2, -drawH*0.85 - bh*0.05 + bh);
    ctx.lineTo(bw/2 - cornerLen, -drawH*0.85 - bh*0.05 + bh);
    ctx.moveTo(bw/2, -drawH*0.85 - bh*0.05 + bh);
    ctx.lineTo(bw/2, -drawH*0.85 - bh*0.05 + bh - cornerLen);
    ctx.stroke();
    
    // 顶部标记
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath();
    ctx.moveTo(0, -drawH * 0.9 - bh * 0.15);
    ctx.lineTo(-8, -drawH * 0.9 - bh * 0.05);
    ctx.lineTo(8, -drawH * 0.9 - bh * 0.05);
    ctx.closePath();
    ctx.fill();
  }
  
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// ==================== 主渲染 ====================
function render() {
  const time = Date.now() / 1000;
  
  ctx.clearRect(0, 0, W, H);
  
  ctx.save();
  if (gameState.shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * gameState.shakeAmount,
      (Math.random() - 0.5) * gameState.shakeAmount
    );
    gameState.shakeAmount *= 0.85;
  }
  
  if (gameState.recoilOffset > 0) {
    ctx.translate(0, gameState.recoilOffset);
    gameState.recoilOffset *= 0.8;
  }
  
  if (gameState.aimMode) {
    ctx.save();
    const zoom = CONFIG.aimZoom;
    const offsetX = gameState.aimX - W / 2;
    const offsetY = gameState.aimY - H / 2;
    
    ctx.translate(W/2, H/2);
    ctx.scale(zoom, zoom);
    ctx.translate(-W/2 - offsetX * (1 - 1/zoom), -H/2 - offsetY * (1 - 1/zoom));
    
    if (gameState.bgCanvas) ctx.drawImage(gameState.bgCanvas, 0, 0);
    
    gameState.enemies.forEach(alien => drawAlien(ctx, alien, time));
    drawParticles(ctx);
    
    ctx.restore();
    
    drawScopeOverlay();
    drawCrosshair();
    
  } else {
    if (gameState.bgCanvas) ctx.drawImage(gameState.bgCanvas, 0, 0);
    gameState.enemies.forEach(alien => drawAlien(ctx, alien, time));
    drawParticles(ctx);
  }
  
  drawGun(ctx);
  ctx.restore();
}

function drawScopeOverlay() {
  const cx = W / 2, cy = H / 2;
  const radius = Math.min(W, H) * 0.30;
  
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.globalCompositeOperation = 'source-over';
  
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();
  
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, radius - 4, 0, Math.PI * 2);
  ctx.stroke();
  
  const vignette = ctx.createRadialGradient(cx, cy, radius * 0.55, cx, cy, radius);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = vignette;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.restore();
}

function drawCrosshair() {
  const cx = W / 2, cy = H / 2, size = 30;
  
  ctx.strokeStyle = 'rgba(231, 76, 60, 0.9)';
  ctx.lineWidth = 1.5;
  
  ctx.beginPath();
  ctx.moveTo(cx - size, cy); ctx.lineTo(cx - 10, cy);
  ctx.moveTo(cx + 10, cy); ctx.lineTo(cx + size, cy);
  ctx.moveTo(cx, cy - size); ctx.lineTo(cx, cy - 10);
  ctx.moveTo(cx, cy + 10); ctx.lineTo(cx, cy + size);
  ctx.stroke();
  
  ctx.fillStyle = 'rgba(231, 76, 60, 0.8)';
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath(); ctx.arc(cx, cy - size - i * 12, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy + size + i * 12, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx - size - i * 12, cy, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + size + i * 12, cy, 1.5, 0, Math.PI * 2); ctx.fill();
  }
  
  ctx.fillStyle = 'rgba(231, 76, 60, 0.9)';
  ctx.beginPath();
  ctx.arc(cx, cy, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawGun(ctx) {
  const gx = W - 25, gy = H - 15;
  const scale = 0.75;
  
  ctx.save();
  ctx.translate(gx, gy);
  ctx.scale(scale, scale);
  ctx.translate(0, -gameState.recoilOffset * 2.5);
  
  // 枪身
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-130, -55, 110, 28);
  ctx.fillStyle = '#34495e';
  ctx.fillRect(-120, -65, 75, 12);
  
  // 枪管
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(-15, -50, 38, 17);
  ctx.fillStyle = '#0d1318';
  ctx.fillRect(18, -47, 10, 11);
  ctx.fillStyle = '#0a0f12';
  ctx.beginPath();
  ctx.arc(28, -42, 6, 0, Math.PI * 2);
  ctx.fill();
  
  // 瞄准镜
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(-110, -80, 52, 17);
  ctx.fillStyle = '#0d1318';
  ctx.beginPath();
  ctx.arc(-110, -72, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#34495e';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(-110, -72, 10, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#0d1318';
  ctx.beginPath();
  ctx.arc(-58, -72, 8, 0, Math.PI * 2);
  ctx.fill();
  
  // 握把
  ctx.fillStyle = '#2c3e50';
  ctx.beginPath();
  ctx.moveTo(-82, -27);
  ctx.lineTo(-92, 18);
  ctx.lineTo(-67, 22);
  ctx.lineTo(-62, -27);
  ctx.closePath();
  ctx.fill();
  
  // 扳机
  ctx.fillStyle = '#1a252f';
  ctx.beginPath();
  ctx.arc(-52, -22, 6, 0, Math.PI, false);
  ctx.lineTo(-58, -19);
  ctx.arc(-52, -19, 4, Math.PI, 0, true);
  ctx.closePath();
  ctx.fill();
  
  // 枪托
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(-150, -50, 25, 24);
  ctx.fillStyle = '#34495e';
  ctx.beginPath();
  ctx.moveTo(-150, -50);
  ctx.lineTo(-170, -40);
  ctx.lineTo(-170, -10);
  ctx.lineTo(-150, -20);
  ctx.closePath();
  ctx.fill();
  
  // 弹匣
  ctx.fillStyle = '#1a252f';
  ctx.fillRect(-92, -17, 19, 33);
  
  ctx.restore();
}

function drawParticles(ctx) {
  gameState.particles = gameState.particles.filter(p => {
    p.life -= 0.02;
    if (p.life <= 0) return false;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return true;
  });
}

// ==================== 游戏逻辑 ====================
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let aimStartX = 0, aimStartY = 0;

canvas.addEventListener('mousedown', (e) => {
  if (!gameState.playing) return;
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  if (gameState.aimMode) {
    aimStartX = gameState.aimX;
    aimStartY = gameState.aimY;
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!gameState.playing) return;
  if (gameState.aimMode && isDragging) {
    const dx = (e.clientX - dragStartX) / CONFIG.aimZoom;
    const dy = (e.clientY - dragStartY) / CONFIG.aimZoom;
    gameState.aimX = Math.max(0, Math.min(W, aimStartX + dx));
    gameState.aimY = Math.max(0, Math.min(H, aimStartY + dy));
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (!gameState.playing) return;
  const rect = canvas.getBoundingClientRect();
  const clickX = (e.clientX - rect.left) * (W / rect.width);
  const clickY = (e.clientY - rect.top) * (H / rect.height);
  
  if (gameState.aimMode) {
    const dist = Math.sqrt(Math.pow(e.clientX - dragStartX, 2) + Math.pow(e.clientY - dragStartY, 2));
    if (!gameState.reloading && dist < 10) {
      shoot(clickX, clickY);
    }
  } else {
    if (!gameState.reloading) {
      shoot(clickX, clickY);
    }
  }
  isDragging = false;
});

canvas.addEventListener('touchstart', (e) => {
  if (!gameState.playing) return;
  e.preventDefault();
  isDragging = true;
  const touch = e.touches[0];
  dragStartX = touch.clientX;
  dragStartY = touch.clientY;
  if (gameState.aimMode) {
    aimStartX = gameState.aimX;
    aimStartY = gameState.aimY;
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  if (!gameState.playing) return;
  e.preventDefault();
  if (gameState.aimMode && isDragging) {
    const touch = e.touches[0];
    const dx = (touch.clientX - dragStartX) / CONFIG.aimZoom;
    const dy = (touch.clientY - dragStartY) / CONFIG.aimZoom;
    gameState.aimX = Math.max(0, Math.min(W, aimStartX + dx));
    gameState.aimY = Math.max(0, Math.min(H, aimStartY + dy));
  }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (!gameState.playing) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.changedTouches[0];
  const clickX = (touch.clientX - rect.left) * (W / rect.width);
  const clickY = (touch.clientY - rect.top) * (H / rect.height);
  
  if (gameState.aimMode) {
    if (!gameState.reloading && isDragging) {
      const dist = Math.sqrt(Math.pow(touch.clientX - dragStartX, 2) + Math.pow(touch.clientY - dragStartY, 2));
      if (dist < 15) shoot(clickX, clickY);
    }
  } else {
    if (!gameState.reloading) {
      shoot(clickX, clickY);
    }
  }
  isDragging = false;
}, { passive: false });

function shoot(clickX, clickY) {
  if (gameState.reloading || gameState.ammo <= 0) {
    if (gameState.ammo <= 0) startReload();
    return;
  }
  
  gameState.ammo--;
  updateAmmoDisplay();
  
  gameState.recoilOffset = 10;
  gameState.shakeAmount = 7;
  
  playSound('shoot');
  setTimeout(() => playSound('shell'), 200);
  
  // 计算射击位置
  let worldX, worldY;
  
  if (gameState.aimMode) {
    const cx = W / 2, cy = H / 2;
    const zoom = CONFIG.aimZoom;
    const offsetX = gameState.aimX - W / 2;
    const offsetY = gameState.aimY - H / 2;
    worldX = (cx - W/2) / zoom + W/2 + offsetX * (1 - 1/zoom);
    worldY = (cy - H/2) / zoom + H/2 + offsetY * (1 - 1/zoom);
  } else {
    worldX = clickX;
    worldY = clickY;
  }
  
  let hit = false;
  
  for (let i = gameState.enemies.length - 1; i >= 0; i--) {
    const alien = gameState.enemies[i];
    if (!alien.alive) continue;
    
    const dx = worldX - alien.x;
    const dy = worldY - (alien.y - alien.size * 0.7);
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < alien.size * 1.0) {
      alien.alive = false;
      alien.hitFlash = 1;
      alien.deathAnim = 1;
      hit = true;
      gameState.enemiesKilled++;
      gameState.score += 100;
      
      playSound('headshot');
      setTimeout(() => playSound('scream'), 150);
      
      // 粒子
      for (let j = 0; j < 20; j++) {
        gameState.particles.push({
          x: alien.x, y: alien.y - alien.size * 0.7,
          vx: (Math.random() - 0.5) * 10,
          vy: (Math.random() - 0.5) * 10 - 4,
          size: 2 + Math.random() * 5,
          color: Math.random() > 0.5 ? '#c0392b' : '#e74c3c',
          life: 1
        });
      }
      
      showHitMarker(W/2, H/2 - 50, '+100');
      updateScore();
      updateEnemyCounter();
      
      if (gameState.enemiesKilled >= CONFIG.totalEnemies) {
        setTimeout(endGame, 1000);
      }
      break;
    }
  }
  
  if (!hit) {
    gameState.score = Math.max(0, gameState.score - 5);
    updateScore();
  }
  
  if (gameState.ammo <= 0) {
    setTimeout(() => { if (gameState.playing) startReload(); }, 400);
  }
}

function startReload() {
  if (gameState.reloading) return;
  gameState.reloading = true;
  document.getElementById('reloadingText').style.display = 'block';
  
  playSound('reload');
  
  setTimeout(() => {
    gameState.ammo = CONFIG.magSize;
    gameState.reloading = false;
    document.getElementById('reloadingText').style.display = 'none';
    updateAmmoDisplay();
  }, CONFIG.reloadTime);
}

function showHitMarker(x, y, text) {
  const marker = document.createElement('div');
  marker.className = 'hit-marker';
  marker.textContent = text;
  marker.style.left = x + 'px';
  marker.style.top = y + 'px';
  document.getElementById('gameContainer').appendChild(marker);
  setTimeout(() => marker.remove(), 800);
}

function toggleAim() {
  if (!gameState.playing) return;
  gameState.aimMode = !gameState.aimMode;
  
  document.getElementById('aimIcon').textContent = gameState.aimMode ? '💥' : '🎯';
  document.getElementById('aimLabel').textContent = gameState.aimMode ? '射击' : '瞄准';
  document.getElementById('hintText').style.display = gameState.aimMode ? 'none' : 'block';
  
  playSound('click');
  playSound('spin');
  
  if (gameState.aimMode) {
    gameState.aimX = W / 2;
    gameState.aimY = H / 2;
  }
}

function useIntel() {
  if (!gameState.playing || gameState.intelUses <= 0) return;
  gameState.intelUses--;
  document.getElementById('intelCount').textContent = gameState.intelUses;
  
  const hidden = gameState.enemies.filter(e => e.alive && !e.revealed);
  if (hidden.length > 0) {
    const target = hidden[Math.floor(Math.random() * hidden.length)];
    target.revealed = true;
    setTimeout(() => { target.revealed = false; }, 5000);
  }
  
  playSound('click');
}

function useScan() {
  if (!gameState.playing || gameState.scanUses <= 0) return;
  gameState.scanUses--;
  document.getElementById('scanCount').textContent = gameState.scanUses;
  
  gameState.enemies.forEach(e => {
    if (e.alive) e.revealTimer = 2;
  });
  
  playSound('click');
}

// ==================== UI更新 ====================
function updateScore() {
  document.getElementById('scoreDisplay').textContent = gameState.score + ' 分';
}

function updateAmmoDisplay() {
  document.getElementById('ammoText').textContent = `弹药 ${gameState.ammo}/${CONFIG.magSize}`;
  const dots = document.getElementById('ammoDots');
  dots.innerHTML = '';
  for (let i = 0; i < CONFIG.magSize; i++) {
    const dot = document.createElement('div');
    dot.className = 'ammo-dot' + (i >= gameState.ammo ? ' empty' : '');
    dots.appendChild(dot);
  }
}

function updateTimerDisplay() {
  const mins = Math.floor(gameState.timeLeft / 60);
  const secs = gameState.timeLeft % 60;
  document.getElementById('timerText').textContent = 
    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function updateEnemyCounter() {
  const container = document.getElementById('enemyCounter');
  container.innerHTML = '';
  for (let i = 0; i < CONFIG.totalEnemies; i++) {
    const icon = document.createElement('div');
    icon.className = 'enemy-icon' + (i < gameState.enemiesKilled ? ' dead' : '');
    icon.textContent = '👤';
    container.appendChild(icon);
  }
}

// ==================== 游戏流程 ====================
function startGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  
  gameState.playing = true;
  gameState.timeLeft = CONFIG.gameTime;
  gameState.score = 0;
  gameState.enemiesKilled = 0;
  gameState.intelUses = 3;
  gameState.scanUses = 2;
  gameState.aimMode = false;
  gameState.ammo = CONFIG.magSize;
  gameState.reloading = false;
  gameState.particles = [];
  gameState.shakeAmount = 0;
  gameState.recoilOffset = 0;
  
  document.getElementById('intelCount').textContent = gameState.intelUses;
  document.getElementById('scanCount').textContent = gameState.scanUses;
  document.getElementById('aimIcon').textContent = '🎯';
  document.getElementById('aimLabel').textContent = '瞄准';
  document.getElementById('hintText').style.display = 'block';
  document.getElementById('reloadingText').style.display = 'none';
  
  generateCity();
  renderBackground();
  generateEnemies();
  
  updateScore();
  updateAmmoDisplay();
  updateTimerDisplay();
  updateEnemyCounter();
  
  gameLoop();
  startTimer();
}

function endGame() {
  gameState.playing = false;
  document.getElementById('endOverlay').classList.remove('hidden');
  document.getElementById('finalScore').textContent = gameState.score;
  document.getElementById('endTitle').textContent = 
    gameState.enemiesKilled >= CONFIG.totalEnemies ? '任务完成!' : '时间到!';
  document.getElementById('endStats').textContent = 
    `消灭 ${gameState.enemiesKilled} / ${CONFIG.totalEnemies} 个外星人`;
}

function restartGame() {
  document.getElementById('endOverlay').classList.add('hidden');
  startGame();
}

let timerInterval;
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameState.playing) return;
    gameState.timeLeft--;
    updateTimerDisplay();
    if (gameState.timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

// ==================== 主循环 ====================
let lastTime = 0;

function gameLoop(timestamp) {
  if (!gameState.playing) return;
  const deltaTime = timestamp - lastTime;
  lastTime = timestamp;
  const time = Date.now() / 1000;
  
  gameState.enemies.forEach(alien => {
    if (!alien.alive) return;
    if (alien.revealTimer > 0) alien.revealTimer -= deltaTime / 1000;
    
    alien.blinkTimer -= deltaTime / 1000;
    if (alien.blinkTimer <= 0) {
      if (alien.blinking) {
        alien.blinking = false;
        alien.blinkTimer = 3 + Math.random() * 5;
      } else {
        alien.blinking = true;
        alien.blinkTimer = 0.15;
      }
    }
  });
  
  gameState.cars.forEach(car => {
    car.x += car.speed;
    if (car.x > W + 100) car.x = -100;
    if (car.x < -100) car.x = W + 100;
  });
  
  render();
  requestAnimationFrame(gameLoop);
}

// 初始化
generateCity();
renderBackground();
render();
updateAmmoDisplay();
</script>
